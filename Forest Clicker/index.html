<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tree Clicker</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<div class="left">

<h1>🌳 Tree Clicker</h1>

<div class="stats">

<div class="stat">
Trees
<span id="clicks">0</span>
</div>

<div class="stat">
Trees / sec
<span id="tps">0</span>
</div>

</div>

</div>


<div class="middle">

<button id="clickButton" class="treeButton">
🌳
</button>

<p class="clickText">Click the tree to plant more trees</p>

</div>


<div class="right">

<h2>Upgrades</h2>

<div class="shopItem">
<button id="pollenator">🐝 Pollenator</button>
<span id="pollenatorCost"></span>
</div>

<div class="shopItem">
<button id="treeHugger">🫂 Tree Hugger</button>
<span id="treeHuggerCost"></span>
</div>

<div class="shopItem">
<button id="rainDancer">💃 Rain Dancer</button>
<span id="rainDancerCost"></span>
</div>

<div class="shopItem">
<button id="treeMancer">🧙 Tree Mancer</button>
<span id="treeMancerCost"></span>
</div>

<div class="shopItem">
<button id="tractor">🚜 Tractor</button>
<span id="tractorCost"></span>
</div>

<div class="shopItem">
<button id="treeXFactor">✨ Tree X-Factor</button>
<span id="treeXFactorCost"></span>
</div>

<div class="shopItem">
<button id="autoPlanter">🤖 Auto Planter</button>
<span id="autoPlanterCost"></span>
</div>

<div class="shopItem">
<button id="seedBomber">💣 Seed Bomber</button>
<span id="seedBomberCost"></span>
</div>

<div class="shopItem">
<button id="interContinentalBallisticSeeder">
🚀 ICB Seeder
</button>
<span id="interContinentalBallisticSeederCost"></span>
</div>

<div class="shopItem">
<button id="seedVirus">🦠 Seed Virus</button>
<span id="seedVirusCost"></span>
</div>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
